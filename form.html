<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <h2>Aplikasi Manajemen Pegawai</h2>
    </header>

    <div class="main-container">

        <aside>
            <ul class="menu">
                <li><a href="dashboard.html" class="aktif">Dashboard</a></li>
                <li><a href="tabel.html">Data Pegawai</a></li>
                <li><a href="tabel.html">Data Jabatan</a></li>
                <li><a href="login.html">Keluar</a></li>
            </ul>
        </aside>

        <section class="main">
            <h2 class="judul">Tambah Pegawai</h2>

            <form action="proses.php" method="post" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="foto">Foto</label>
                    <div class="input">
                        <input type="file" id="foto" name="foto">
                    </div>
                </div>

                <div class="form-group">
                    <label for="nama">Nama</label>
                    <div class="input">
                        <input type="text" id="nama" name="nama" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin</label><br>
                    <input type="radio" id="jk_l" name="jk" value="L">
                    <label for="jk_l">Laki-laki</label>

                    <input type="radio" id="jk_p" name="jk" value="P">
                    <label for="jk_p">Perempuan</label>
                </div>

                <div class="form-group">
                    <label for="tanggal">Tanggal Lahir</label>
                    <div class="input">
                        <input type="date" id="tanggal" name="tanggal" class="form-control"> #perubahan 1#
                    </div>
                </div>

                <div class="form-group">
                    <label for="jabatan">Jabatan</label>
                    <div class="input">
                        <select id="jabatan" name="jabatan">
                            <option value="direktur">Direktur</option>
                            <option value="manajer">Manajer</option>
                            <option value="marketing">Marketing</option>
                            <option value="sekretaris">Sekretaris</option>
                            <option value="chef">Chef</option>
                            <option value="waiter">Waiter/Waitress</option>
                            <option value="kasir">Kasir</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="submit" value="Simpan" class="btn btn-primary"> #perubahan 2#
                    <input type="reset" value="Batal" class="btn btn-secondary">
                </div>

            </form>
        </section>

    </div>

    <footer>
        <p>&copy; 2026</p>
    </footer>

</body>
</html>
